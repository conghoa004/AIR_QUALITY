  #     CA_CERT_PATH: /app/emqxsl-ca.crt
  #     KAFKA_TOPIC: air_quality
  #   networks:
  #     - bigdata-network

  consumer:
    build:
      context: ./tracking_consumer  # context là thư mục tracking_consumer
      dockerfile: Dockerfile
    container_name: kafka_consumer
    depends_on:
      - kafka1
      - kafka2
    env_file:
      - ./tracking_consumer/.env-docker
    restart: unless-stopped
    networks:
      - bigdata-network

networks:
  bigdata-network:
    external: true