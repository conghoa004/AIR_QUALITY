version: '3.8'
services:
  spark-master:
    image: apache/spark-custom:4.0.1
    container_name: spark-master
    hostname: spark-master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_WEBUI_PORT=8080
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]
    ports:
      - "8082:8080"   # Web UI
      - "7077:7077"   # Master port
    restart: unless-stopped
    networks:
      - bigdata-network
    volumes:
      - ./work-dir:/opt/spark/work-dir

  spark-worker-1:
    image: apache/spark-custom:4.0.1
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_CORES=8
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_PORT=7078
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    restart: unless-stopped
    networks:
      - bigdata-network
    volumes:
      - ./work-dir:/opt/spark/work-dir

  # spark-worker-2:
  #   image: apache/spark-custom:4.0.1
  #   container_name: spark-worker-2
  #   depends_on:
  #     - spark-master
  #   environment:
  #     - SPARK_WORKER_CORES=2
  #     - SPARK_WORKER_MEMORY=2G
  #     - SPARK_WORKER_PORT=7079
  #     - SPARK_RPC_AUTHENTICATION_ENABLED=no
  #     - SPARK_RPC_ENCRYPTION_ENABLED=no
  #   command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
  #   restart: unless-stopped
  #   networks:
  #     - bigdata-network
  #   volumes:
  #     - ./work-dir:/opt/spark/work-dir

networks:
  bigdata-network:
    external: true